# Local demo: FPI Reasoning Engine + API, plus the technician dashboard.
# `docker compose up` brings both up for the §14 dashboard demo.
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: fpi-api:0.1.0
    ports:
      - "8000:8000"
    environment:
      - FPI_ENV=demo
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 3s
      retries: 3

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: fpi-dashboard:0.1.0
    ports:
      - "5173:80"
    depends_on:
      - api
    environment:
      # Dashboard reads the API base URL at build/runtime; see dashboard/.env
      - VITE_API_BASE=http://localhost:8000
